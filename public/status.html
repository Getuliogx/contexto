<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Status Contexto Chat</title>
<style>
body{font-family:Arial,sans-serif;background:#111;color:#eee;margin:20px} .box{background:#1d1d1d;border:1px solid #333;border-radius:10px;padding:14px;margin:12px 0} code{background:#000;padding:2px 5px;border-radius:4px}.ok{color:#20e070}.bad{color:#ff6060}.item{border-bottom:1px solid #333;padding:7px 0}.nick{font-weight:bold}.small{color:#aaa;font-size:12px}</style>
</head>
<body>
<h1>Status Contexto Chat</h1>
<div class="box" id="main">Carregando...</div>
<div class="box"><h2>Últimas mensagens brutas da Twitch</h2><div id="raw"></div></div>
<div class="box"><h2>Palavras aceitas</h2><div id="recent"></div></div>
<div class="box"><h2>Rejeitadas / motivo</h2><div id="rejected"></div></div>
<script>
async function load(){
 const r = await fetch('/api/status');
 const d = await r.json();
 const s = d.status;
 document.getElementById('main').innerHTML = `
 <div>Canal: <code>${s.twitchChannel || 'VAZIO'}</code></div>
 <div>Twitch conectada: <b class="${s.twitchConnected?'ok':'bad'}">${s.twitchConnected?'SIM':'NÃO'}</b></div>
 <div>Erro Twitch: <code>${s.twitchConnectionError || 'nenhum'}</code></div>
 <div>Modo: <code>${d.config.mode}</code></div>
 <div>Total recebido da Twitch: <code>${s.totalRaw}</code></div>
 <div>Total aceito: <code>${s.totalAccepted}</code></div>
 <div>Total rejeitado: <code>${s.totalRejected}</code></div>
 <div>Aba Contexto conectada no WebSocket: <code>${s.websocketClients}</code></div>
 <div>Última mensagem Twitch: <code>${s.lastTwitchMessageAt || 'nenhuma'}</code></div>
 `;
 document.getElementById('raw').innerHTML = (d.rawMessages||[]).slice().reverse().map(x=>`<div class=item><span class=nick style="color:${x.color}">${x.nick}</span>: ${x.raw}<div class=small>${x.time}</div></div>`).join('') || 'Nada recebido ainda.';
 document.getElementById('recent').innerHTML = (d.recent||[]).slice().reverse().map(x=>`<div class=item><span class=nick style="color:${x.color}">${x.nick}</span>: ${x.word}<div class=small>${x.source} - ${x.time}</div></div>`).join('') || 'Nada aceito ainda.';
 document.getElementById('rejected').innerHTML = (d.rejected||[]).slice().reverse().map(x=>`<div class=item><b>${x.reason}</b> — ${x.nick||''}: ${x.word||''}<div class=small>${x.source||''} - ${x.time}</div></div>`).join('') || 'Nada rejeitado ainda.';
}
load(); setInterval(load, 2000);
</script>
</body>
</html>
